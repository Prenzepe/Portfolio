name: Rebuild Projects Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'projects/**'   # only runs when you add/edit/remove project folders
      - 'build.js'

  workflow_dispatch:    # lets you trigger it manually from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed so the bot can commit projects.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        run: node build.js

      - name: Commit projects.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git diff --staged --quiet || git commit -m "chore: rebuild projects.json [skip ci]"
          git push
